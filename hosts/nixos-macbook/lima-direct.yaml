# Safe snapshot mode - won't modify your dual-boot partition
vmType: "vz"
os: null

arch: "aarch64"

# Start conservative, adjust later
cpus: 4
memory: "6GiB"

images:  []

disks: 
  # Your existing NixOS root partition (READ-ONLY)
  - name: "nixos-root"
    # ⚠️ CHANGE THIS to your actual partition from diskutil list
    # Example: /dev/disk0s5
    device: "/dev/disk0s7"  # <-- UPDATE THIS
    format: false

# Mount existing partitions
additionalDisks:
  # EFI partition (if separate)
  - name: "efi"
    device: "/dev/disk0s5"  # <-- UPDATE if you have separate EFI
    format: false

mounts:
  # Share your nix config
  - location: "~/nix"
    writable: true
  # Share your Shared partition
  - location: "/Volumes/Shared"
    writable: true
  # Share home
  - location: "~"
    writable: true

mountType: "virtiofs"

networks:
  - vzNAT:  true

video:
  display: "vz"

firmware: 
  legacyBIOS: false

ssh:
  localPort: 0
  loadDotSSHPubKeys: true
  forwardAgent: true

# Critical: Use existing system, no provisioning
provision: []

# Environment to match your setup
env:
  USER: silvijai
